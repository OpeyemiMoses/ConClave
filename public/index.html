<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ConClave — Multi-Agent Repo Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  body { font-family: ui-monospace, "SF Mono", Consolas, monospace; background: #0b0d10; color: #e6e6e6; max-width: 860px; margin: 0 auto; padding: 40px 20px; line-height: 1.5; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .sub { color: #9098a0; margin-bottom: 28px; }
  .row { display: flex; gap: 8px; margin-bottom: 20px; }
  input { flex: 1; background: #14171a; border: 1px solid #2a2f35; color: #e6e6e6; padding: 10px 12px; border-radius: 6px; font-family: inherit; }
  button { background: #2f6fed; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-family: inherit; }
  button:disabled { opacity: 0.5; cursor: default; }
  button.secondary { background: #23262b; }
  pre { white-space: pre-wrap; background: #14171a; border: 1px solid #2a2f35; padding: 16px; border-radius: 6px; font-size: 0.85rem; }
  .status { color: #9098a0; font-size: 0.85rem; margin-bottom: 12px; }
</style>
</head>
<body>
  <h1>ConClave</h1>
  <div class="sub">Multi-agent repo analysis — architecture, security, dependencies, onboarding, synthesized.</div>

  <div class="row">
    <input id="url" placeholder="https://github.com/owner/repo" />
    <button id="analyzeBtn">Analyze</button>
    <button id="reanalyzeBtn" class="secondary">Re-analyze</button>
  </div>
  <div class="status" id="status"></div>
  <pre id="output">Report will appear here.</pre>

  <script>
    const $ = (id) => document.getElementById(id);

    async function run(endpoint) {
      const url = $("url").value.trim();
      if (!url) return;
      $("status").textContent = "Running (this can take 30-90s depending on repo size)...";
      $("analyzeBtn").disabled = true;
      $("reanalyzeBtn").disabled = true;
      $("output").textContent = "";
      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, format: "markdown" }),
        });
        const text = await res.text();
        if (!res.ok) throw new Error(text);
        $("output").textContent = text;
        $("status").textContent = "Done.";
      } catch (err) {
        $("status").textContent = "Error.";
        $("output").textContent = err.message;
      } finally {
        $("analyzeBtn").disabled = false;
        $("reanalyzeBtn").disabled = false;
      }
    }

    $("analyzeBtn").onclick = () => run("/analyze_repo");
    $("reanalyzeBtn").onclick = () => run("/reanalyze_repo");
  </script>
</body>
</html>
